name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "release-build-windows"
          save-if: ${{ github.ref_name == 'master' }}

      - name: Build Release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: target/x86_64-pc-windows-msvc/release/ggpk-explorer.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libssl-dev \
            pkg-config \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libglib2.0-dev \
            libunistring-dev \
            cmake \
            g++

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: "release-build-linux"
          save-if: ${{ github.ref_name == 'master' }}

      - name: Build Release
        run: cargo build --release

      - name: Package .deb
        run: |
          cargo install cargo-deb
          cargo deb --no-build
          cp target/debian/*.deb ggpk-explorer-linux.deb

      - name: Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          install -d AppDir/usr/share/icons/hicolor/256x256/apps
          install -m 0644 assets/icon-256x256.png AppDir/usr/share/icons/hicolor/256x256/apps/ggpk-explorer.png
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e target/release/ggpk-explorer \
            -i AppDir/usr/share/icons/hicolor/256x256/apps/ggpk-explorer.png \
            -d assets/ggpk-explorer.desktop \
            --output appimage
          mv GGPK_Explorer*.AppImage ggpk-explorer-linux.AppImage

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            ggpk-explorer-linux.deb
            ggpk-explorer-linux.AppImage

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: windows-artifacts

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: linux-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            windows-artifacts/ggpk-explorer.exe
            linux-artifacts/ggpk-explorer-linux.deb
            linux-artifacts/ggpk-explorer-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
